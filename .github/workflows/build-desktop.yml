name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  VITE_FASTAPI_URL: http://localhost:8000

jobs:
  build-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.11"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-${{ matrix.platform }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ matrix.platform }}-

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        timeout-minutes: 20

      - name: Build sidecar with PyInstaller
        working-directory: backend
        run: pyinstaller sermonclip-api.spec --distpath dist --clean --noconfirm
        timeout-minutes: 15

      - name: Copy sidecar to Tauri binaries
        run: |
          mkdir -p desktop/src-tauri/binaries
          cp backend/dist/sermonclip-api desktop/src-tauri/binaries/sermonclip-api-${{ matrix.target }}

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: desktop/src-tauri/binaries/sermonclip-api-*

  build-tauri:
    needs: build-sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: desktop/src-tauri/binaries/

      - name: Make sidecar executable
        run: chmod +x desktop/src-tauri/binaries/sermonclip-api-*

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "SermonClip ${{ github.ref_name }}"
          releaseBody: |
            ## SermonClip ${{ github.ref_name }}

            ### Installation (macOS Apple Silicon)
            1. Download the `.dmg` file below
            2. Open it and drag SermonClip to Applications
            3. On first launch, right-click the app → Open (to bypass Gatekeeper)
            4. Or run: `xattr -cr /Applications/SermonClip.app`

            The app will auto-install FFmpeg, Ollama, and Whisper MLX on first run.
          releaseDraft: true
          prerelease: false

  cleanup-artifacts:
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: geekyeggo/delete-artifact@v5
        with:
          name: sidecar-*
