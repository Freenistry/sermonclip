name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  VITE_FASTAPI_URL: http://localhost:18080

jobs:
  build-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            python-version: "3.11"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-${{ matrix.platform }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ matrix.platform }}-

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        timeout-minutes: 20

      - name: Download static FFmpeg binaries
        run: |
          mkdir -p backend/ffmpeg-bin
          curl -fSL -o /tmp/ffmpeg.zip "https://evermeet.cx/ffmpeg/get/zip"
          curl -fSL -o /tmp/ffprobe.zip "https://evermeet.cx/ffmpeg/get/ffprobe/zip"
          unzip -o /tmp/ffmpeg.zip -d backend/ffmpeg-bin/
          unzip -o /tmp/ffprobe.zip -d backend/ffmpeg-bin/
          chmod +x backend/ffmpeg-bin/ffmpeg backend/ffmpeg-bin/ffprobe
          file backend/ffmpeg-bin/ffmpeg
          ls -la backend/ffmpeg-bin/

      - name: Build sidecar with PyInstaller
        working-directory: backend
        run: pyinstaller sermonclip-api.spec --distpath dist --clean --noconfirm
        timeout-minutes: 15

      - name: Copy sidecar to Tauri binaries
        run: |
          mkdir -p desktop/src-tauri/binaries
          cp backend/dist/sermonclip-api desktop/src-tauri/binaries/sermonclip-api-${{ matrix.target }}

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: desktop/src-tauri/binaries/sermonclip-api-*

  build-tauri:
    needs: build-sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: desktop/src-tauri/binaries/

      - name: Make sidecar executable
        run: chmod +x desktop/src-tauri/binaries/sermonclip-api-*

      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          # Decode certificate
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Bertwin Romero (M3DL96CMU9)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "SermonClip ${{ github.ref_name }}"
          releaseBody: |
            ## SermonClip ${{ github.ref_name }}

            ### Installation (macOS Apple Silicon)
            1. Download the `.dmg` file below
            2. Open the DMG and drag **SermonClip** to **Applications**
            3. Double-click to launch — the app is signed and notarized by Apple
            4. The app will auto-install FFmpeg, Ollama, and Whisper MLX on first run
          releaseDraft: false
          prerelease: false

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  cleanup-artifacts:
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: geekyeggo/delete-artifact@v5
        with:
          name: sidecar-*
